services:
  flight-db:
    image: postgres:16-alpine
    container_name: postgresql
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flight-app
    restart: unless-stopped

  flight-backend:
    image: ${IMAGE_NAME_BACKEND:-flight-backend}:latest
    container_name: flight-backend
    ports:
      - "127.0.0.1:8010:8010"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - OTEL_SERVICE_NAME=flight-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=console,otlp
      - OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED=true
    networks:
      - flight-app
    depends_on:
      - flight-db
    restart: unless-stopped

  flight-frontend:
    image: ${IMAGE_NAME_FRONTEND:-flight-frontend}:latest
    container_name: flight-frontend
    ports:
      - "127.0.0.1:3010:3010"
    networks:
      - flight-app
    depends_on:
      - flight-backend
    restart: unless-stopped

networks:
  flight-app:
    name: flight-app
    external: true

volumes:
  postgres_data:
