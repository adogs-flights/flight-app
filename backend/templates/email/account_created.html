<!DOCTYPE html>
<html lang="ko" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <style>
        /* 기본 초기화 */
        body { margin: 0; padding: 0; background-color: #f1f5f9; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table { border-spacing: 0; border-collapse: collapse; }
        td { padding: 0; }
        img { border: 0; }

        /* 다크모드 강제 라이트 테마 유지 (일부 클라이언트 대응) */
        :root { color-scheme: light; supported-color-schemes: light; }
        
        @media (prefers-color-scheme: dark) {
            body, .wrapper-table { background-color: #f1f5f9 !important; color: #1e293b !important; }
            .container { background-color: #ffffff !important; }
            .welcome-title, .logo-text, .credential-value-text { color: #0f172a !important; }
            .description, .credential-label-text { color: #64748b !important; }
            .credential-card-bg { background-color: #f8fafc !important; border-color: #e2e8f0 !important; }
            .value-bg { background-color: #ffffff !important; border-color: #f1f5f9 !important; }
        }

        /* 모바일 전용 스타일 */
        @media only screen and (max-width: 600px) {
            .container { width: 100% !important; border-radius: 0 !important; }
            .content-padding { padding: 30px 20px !important; }
            .welcome-title { font-size: 20px !important; }
            .description { font-size: 14px !important; }
            .credential-box { padding: 20px 15px !important; }
            
            /* 세로 배치로 변경 */
            .credential-label { 
                display: block !important; 
                width: 100% !important; 
                padding-bottom: 6px !important; 
                font-size: 13px !important; 
            }
            .credential-value { 
                display: block !important; 
                width: 100% !important; 
                padding-bottom: 16px !important; 
            }
            .credential-value span { 
                padding: 6px 10px !important; 
                font-size: 15px !important; 
                display: block !important; 
                text-align: center !important;
            }
            
            .btn-full { display: block !important; width: 100% !important; box-sizing: border-box !important; padding: 16px 20px !important; }
        }
    </style>
</head>

                                        해봉티켓
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- 컨텐츠 -->
                    <tr>
                        <td style="padding: 0 40px 40px;" class="content-padding">
                            <h1 style="font-size: 24px; font-weight: 700; color: #0f172a; margin: 0 0 12px; text-align: center;" class="welcome-title">$name님, 환영합니다!</h1>
                            <p style="font-size: 16px; color: #64748b; text-align: center; margin: 0 0 32px; line-height: 1.6;" class="description">

                                아래 계정 정보로 서비스를 이용해 보세요.

                                <tr>
                                    <td style="padding: 28px;" class="credential-box">
                                        <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                            <tr>

                                                </td>
                                            </tr>
                                        </table>
                                        
                                        <!-- 경고 문구 -->
                                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top: 24px;">
                                            <tr>
                                                <td align="center" style="font-size: 13px; color: #e11d48; font-weight: 500;">

                                            </tr>
                                        </table>

                                </tr>
                            </table>

                            <!-- 버튼 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top: 32px;">
                                <tr>
                                    <td align="center">
                                        <a href="$base_url/login" style="background-color: #0367A6; color: #ffffff !important; padding: 16px 40px; border-radius: 10px; text-decoration: none; font-weight: 600; display: inline-block;" class="btn-full">로그인하기</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
                <!-- 푸터 -->
                <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px;">
                    <tr>
                        <td align="center" style="padding: 30px 20px; font-size: 12px; color: #94a3b8; line-height: 1.8;">

                </td>

                <![endif]-->
            </td>
        </tr>
    </table>
</body>
</html>
