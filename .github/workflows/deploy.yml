name: Deploy Flight App

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # 변경 사항 감지 (Path-based filtering)
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            config:
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

  # 프론트엔드 빌드 (병렬 실행 & 캐싱 적용)
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/flight-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 백엔드 빌드 (병렬 실행 & 캐싱 적용)
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/flight-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 통합 배포 (빌드 성공 또는 설정 변경 시 실행)
  deploy:
    needs: [changes, build-frontend, build-backend]
    if: |
      always() &&
      (needs.build-frontend.result == 'success' || needs.build-backend.result == 'success' || 
       (needs.changes.outputs.config == 'true' && needs.build-frontend.result != 'failure' && needs.build-backend.result != 'failure'))
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository_owner }}/flight-frontend
      IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository_owner }}/flight-backend
    steps:
      - uses: actions/checkout@v4
      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_KEY }}
          port: ${{ secrets.ORACLE_PORT }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/flight-app"

      - name: Deploy via SSH (Robust)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_KEY }}
          port: ${{ secrets.ORACLE_PORT }}
          envs: IMAGE_NAME_FRONTEND, IMAGE_NAME_BACKEND
          script: |
            set -e  # 에러 발생 시 즉시 중단
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            cd /home/ubuntu/flight-app
            
            # .env 파일 생성
            cat << 'EOF' > .env
            ${{ secrets.ENV_FILE }}
            EOF
            
            # 환경 변수 명시적 전달 및 이미지 갱신
            export IMAGE_NAME_FRONTEND=$IMAGE_NAME_FRONTEND
            export IMAGE_NAME_BACKEND=$IMAGE_NAME_BACKEND
            
            docker compose pull
            docker compose up -d --remove-orphans
            
            # 사용하지 않는 이미지 정리 (선택 사항)
            docker image prune -f
