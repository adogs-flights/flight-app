name: Deploy Flight App

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set Image Names
      run: |
        REPO_NAME=$(echo "${{ github.repository }}/flight" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME_FRONTEND=ghcr.io/${REPO_NAME}-frontend" >> $GITHUB_ENV
        echo "IMAGE_NAME_BACKEND=ghcr.io/${REPO_NAME}-backend" >> $GITHUB_ENV

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        platforms: linux/arm64
        push: true
        tags: ${{ env.IMAGE_NAME_FRONTEND }}:latest

    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        platforms: linux/arm64
        push: true
        tags: ${{ env.IMAGE_NAME_BACKEND }}:latest

    - name: Copy docker-compose.yml to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ${{ secrets.ORACLE_USER }}
        key: ${{ secrets.ORACLE_KEY }}
        port: ${{ secrets.ORACLE_PORT }}
        source: "docker-compose.yml"
        target: "/home/ubuntu/flight-app"

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ${{ secrets.ORACLE_USER }}
        key: ${{ secrets.ORACLE_KEY }}
        port: ${{ secrets.ORACLE_PORT }}
        envs: IMAGE_NAME_FRONTEND, IMAGE_NAME_BACKEND
        script: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          cd /home/ubuntu/flight-app

          cat << 'EOF' > .env
          ${{ secrets.ENV_FILE }}
          EOF
          
          docker pull $IMAGE_NAME_FRONTEND:latest
          docker pull $IMAGE_NAME_BACKEND:latest
          
          export IMAGE_NAME_FRONTEND=$IMAGE_NAME_FRONTEND
          export IMAGE_NAME_BACKEND=$IMAGE_NAME_BACKEND
          
          docker compose down
          docker compose up -d
          
          docker image prune -f